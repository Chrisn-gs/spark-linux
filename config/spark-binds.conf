# ═══════════════════════════════════════════════════════
# Spark for Linux — Hyprland keybindings
# Add this to your hyprland.conf or source it:
#   source = ~/.config/hypr/spark-binds.conf
# ═══════════════════════════════════════════════════════

# Adjust SPARK_DIR to your installation path
$SPARK_DIR = /home/chrisn/spark-linux

# Category launchers (Alt + letter)
bind = ALT, C, exec, $SPARK_DIR/scripts/spark.sh code
bind = ALT, B, exec, $SPARK_DIR/scripts/spark.sh browser
bind = ALT, A, exec, $SPARK_DIR/scripts/spark.sh ai
bind = ALT, D, exec, $SPARK_DIR/scripts/spark.sh document
bind = ALT, T, exec, $SPARK_DIR/scripts/spark.sh tools
bind = ALT, S, exec, $SPARK_DIR/scripts/spark.sh social
bind = ALT, E, exec, $SPARK_DIR/scripts/spark.sh folders
bind = ALT, V, exec, $SPARK_DIR/scripts/spark.sh pin

# Global search
bind = ALT, SPACE, exec, $SPARK_DIR/scripts/spark.sh --search

# Recent launches
bind = ALT, R, exec, $SPARK_DIR/scripts/spark.sh --recent
