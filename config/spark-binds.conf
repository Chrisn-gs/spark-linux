# ═══════════════════════════════════════════════════════
# Spark for Linux — Hyprland keybindings
# Uses ALT+SHIFT to avoid conflicts with Hyprland defaults
#
# For Lua config (hyprland.lua):
#   require("spark-binds")
#   (see spark-binds.lua)
#
# For .conf config:
#   source = ~/.config/hypr/spark-binds.conf
# ═══════════════════════════════════════════════════════

$SPARK_DIR = /home/chrisn/spark-linux

# Category launchers (ALT + SHIFT + letter)
bind = ALT SHIFT, C, exec, $SPARK_DIR/scripts/spark.sh code
bind = ALT SHIFT, B, exec, $SPARK_DIR/scripts/spark.sh browser
bind = ALT SHIFT, A, exec, $SPARK_DIR/scripts/spark.sh ai
bind = ALT SHIFT, D, exec, $SPARK_DIR/scripts/spark.sh document
bind = ALT SHIFT, T, exec, $SPARK_DIR/scripts/spark.sh tools
bind = ALT SHIFT, S, exec, $SPARK_DIR/scripts/spark.sh social
bind = ALT SHIFT, E, exec, $SPARK_DIR/scripts/spark.sh folders
bind = ALT SHIFT, V, exec, $SPARK_DIR/scripts/spark.sh pin

# Global search
bind = ALT SHIFT, SPACE, exec, $SPARK_DIR/scripts/spark.sh --search

# Recent launches
bind = ALT SHIFT, R, exec, $SPARK_DIR/scripts/spark.sh --recent
